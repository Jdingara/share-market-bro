[server]
# Bind to localhost only - this dashboard can start/stop a bot connected to a
# real Zerodha account, so it must never be reachable from outside this machine.
address = "localhost"
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2a78d6"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f2f5f9"
textColor = "#14181f"
font = "sans serif"
